<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!--Tailwind link-->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="tailwind.init.css">

    <!--font-awesome link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--Google Fonts link-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;

        }
    </style>
</head>

<body>
    <!-- nav section -->
    <nav class="grid grid-cols-2 px-20 py-5 justify-around shadow-sm">
        <div class="flex">
            <img class="w-9 h-9" src="assets/github-logo.png" alt="">
            <h2 class="my-auto mt-1.5 ml-1.5">GitHub Issues Tracker</h2>
        </div>
        <div class="justify-end grid">
            <div class="relative w-full">
                <i class="fa-brands fa-sistrix absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="search" placeholder="Search issues..."
                    class="border pl-10 p-3 outline-none border-[#E4E4E7] focus:border-[#E4E4E7]">
                <button class="p-3 text-[#ffffff] bg-[#4A00FF] ml-4"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </nav>

    <!-- button section -->
    <section class="w-[85%] m-auto mt-14 grid ">
        <div class="btnContainer flex gap-2 p-6 shadow-sm ">

            <button onclick="toggleStyle('allBtn')"
                class="text-[#FFFFFF] font-medium text-center bg-[#4A00FF] rounded-md shadow-sm py-2 px-6 border-[#E4E4E7] border  hover:scale-110 transition duration-500  "
                id="allBtn">All</button>
            <button onclick="toggleStyle('OpenBtn')"
                class="text-[#64748B] font-medium text-center bg-[#FFFFFF] border-[#E4E4E7] border rounded-md shadow-sm py-2 px-6  hover:scale-110 transition duration-500 "
                id="OpenBtn">Open</button>
            <button onclick="toggleStyle('ClosedBtn')"
                class="text-[#64748B] font-medium text-center bg-[#FFFFFF] border-[#E4E4E7] border rounded-md shadow-sm py-2 px-6 hover:scale-110 transition duration-500 "
                id="ClosedBtn">Closed</button>
        </div>
    </section>

    <!-- issue count section -->
    <section class="grid grid-cols-2 w-[85%] m-auto mt-4 shadow  p-6">
        <div class="flex gap-2">
            <img src="assets/Aperture.png" alt="">
            <div>
                <h1 class="text-[20px] font-semibold"><span>50 </span>Issues</h1>
                <p class="text-[#64748B] text-[16px]">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex justify-end gap-4 mt-2">
            <div class="flex gap-2">
                <p class="bg-[#00A96E] w-3 h-3 rounded-[50%] mt-1"></p>
                <p class="text-[16px]">Open</p>
            </div>
            <div class="flex gap-2">
                <p class="bg-[#A855F7] w-3 h-3 rounded-[50%] mt-1"></p>
                <p class="text-[16px]">Closed</p>
            </div>
        </div>
    </section>

    <!-- card section -->
    <section id="navigationMenu" class="w-[85%] m-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 bg-[#FBFBFB] p-6">

</body>
