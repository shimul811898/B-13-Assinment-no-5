<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!--Tailwind link-->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="tailwind.init.css">

    <!-- daisyUI link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!--font-awesome link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--Google Fonts link-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;

        }
    </style>
</head>

<body>
    <!-- login page -->
    <section class="justify-center items-center grid  ">
        <div class="shadow-sm p-8">
            <img src="assets/github-logo.png" alt="" class="m-auto">
            <h1 class="text-center pt-6 text-2xl font-semibold">GitHub Issues Tracker</h1>
            <input type="text" id="Username"
                class="border p-3 border-w-full border-[#E4E4E7] focus:border-[#E4E4E7] outline-none"
                placeholder="Enter Username">
            <p class="pt-2 text-[14px] text-[#4A00FF] pb-4">Default: admin</p>
            <label for="" class="text-[16px] font-medium  pb-2">Password</label><br>
            <input type="text" id="Password"
                class="border p-3 border-w-full border-[#E4E4E7] focus:border-[#E4E4E7] outline-none"
                placeholder="Enter Password">
            <p class="pt-2 text-[14px] text-[#4A00FF] pb-4">Default: admin123</p>
            <button id="login-btn" onclick="login()"
                class="text-[16px] font-semibold text-[#FFFFFF] bg-[#4A00FF] text-center w-[97%] p-4">Sign
                In</button>
            <div class="flex items-center">
                <div class="flex-grow h-px bg-gray-300"></div>
                <span class="px-3 text-gray-400 text-sm p-6">OR</span>
                <div class="flex-grow h-px bg-gray-300"></div>
            </div>
            <p class="text-[14px] text-[#64748B] pb-4 text-center">Demo Credentials:</p>
            <div class="bg-[#F8FAFC] text-center p-6">
                <p><span class="text-[16px] font-semibold">Username:</span> admin</p>
                <p><span class="text-[16px] font-semibold">Password:</span> admin123</p>
            </div>
        </div>
        <p class="text-center text-[#64748B] text-[16px] pb-6">Sign in to manage your issues</p>
        <label for="" class="text-[16px] font-medium pb-2"></label>Username</label><br>

    </section>

    <script src="script.js"></script>
</body>

</html>
